[workspace]
name = "cltas"
version = "0.1.0"
description = "C/C++ Language Toolchain And System"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.12"

[pypi-dependencies]
requests = "*"
tomli-w = "*"
mkdocs-material = "*"
pyyaml = "*"

[tasks]
fetch = "python scripts/fetch_data.py"
generate = "python scripts/generate_docs.py"
serve = { cmd = "mkdocs serve", depends-on = ["generate"] }
build = { cmd = "mkdocs build", depends-on = ["generate"] }
update = { cmd = "python scripts/fetch_data.py && python scripts/generate_docs.py" }
