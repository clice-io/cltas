name: Update Toolchain Data

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.46.0

      - name: Install LLVM (for clang --print-targets)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Fetch all data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pixi run fetch

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet -- data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: update toolchain data ($(date -u +%Y-%m-%d))"
          git push
