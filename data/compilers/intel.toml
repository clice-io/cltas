[meta]
name = "Intel oneAPI DPC++/C++ Compiler"
vendor = "Intel"
url = "https://www.intel.com/content/www/us/en/developer/tools/oneapi/dpc-compiler.html"
description = "Intel oneAPI DPC++/C++ Compiler (icx/icpx/dpcpp) is a next-generation compiler based on LLVM. It replaces the classic Intel C++ Compiler (icc/icpc). Supports SYCL, OpenMP offload, and targets Intel CPUs, GPUs, and FPGAs."

