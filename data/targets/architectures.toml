# C++ Compilation Target Architectures
# Sources: clang --print-targets, LLVM target triple documentation, GCC documentation
#
# Target triple format: <arch>-<vendor>-<os>-<environment>

# --- x86 family ---

[[architectures]]
name = "x86_64"
aliases = ["amd64", "x86-64", "x64"]
description = "64-bit x86 (EM64T / AMD64)"
pointer_width = 64
endian = "little"
vendors = ["pc", "unknown", "apple"]
common_os = ["linux", "windows", "darwin", "freebsd", "netbsd", "openbsd", "dragonfly", "solaris", "haiku"]
common_triples = [
    "x86_64-pc-linux-gnu",
    "x86_64-pc-linux-musl",
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "x86_64-pc-windows-msvc",
    "x86_64-pc-windows-gnu",
    "x86_64-apple-darwin",
    "x86_64-apple-macosx",
    "x86_64-unknown-freebsd",
    "x86_64-unknown-netbsd",
    "x86_64-unknown-openbsd",
]

[[architectures]]
name = "i686"
aliases = ["i386", "i486", "i586", "x86", "ia32"]
description = "32-bit x86 (Pentium Pro and above)"
pointer_width = 32
endian = "little"
vendors = ["pc", "unknown", "apple"]
common_os = ["linux", "windows", "freebsd"]
common_triples = [
    "i686-pc-linux-gnu",
    "i686-pc-linux-musl",
    "i686-unknown-linux-gnu",
    "i686-pc-windows-msvc",
    "i686-pc-windows-gnu",
    "i686-apple-darwin",
    "i686-unknown-freebsd",
]

