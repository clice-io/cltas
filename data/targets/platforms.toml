# C++ Compilation Target Platforms (OS + Environment combinations)
# Sources: LLVM target triple documentation, GCC documentation, cross-compilation references
#
# Target triple format: <arch>-<vendor>-<os>-<environment>

# --- Linux ---

[[platforms]]
os = "linux"
description = "Linux-based systems (kernel 2.6+)"
environments = ["gnu", "gnueabi", "gnueabihf", "gnuabi64", "gnux32", "musl", "musleabi", "musleabihf", "muslabi64", "android", "androideabi"]
object_format = "elf"
common_vendors = ["unknown", "pc", "linux"]
notes = "Most common server/desktop/embedded target. gnu = glibc, musl = musl-libc."

[[platforms]]
os = "windows"
description = "Microsoft Windows (Win32/Win64 API)"
environments = ["msvc", "gnu", "gnullvm"]
object_format = "coff/pe"
common_vendors = ["pc"]
notes = "msvc = Microsoft Visual C++ ABI/CRT, gnu = MinGW/GCC ABI with MSVCRT, gnullvm = MinGW with LLVM tools."

[[platforms]]
os = "darwin"
description = "Apple macOS / Mac OS X"
environments = [""]
object_format = "macho"
common_vendors = ["apple"]
notes = "Usually specified as <arch>-apple-darwin or <arch>-apple-macosx<version>."

[[platforms]]
os = "ios"
description = "Apple iOS"
environments = ["", "simulator", "macabi"]
object_format = "macho"
common_vendors = ["apple"]
notes = "macabi = Mac Catalyst (iOS apps on macOS). Simulator targets use x86_64 or arm64."

[[platforms]]
os = "tvos"
description = "Apple tvOS"
environments = ["", "simulator"]
object_format = "macho"
common_vendors = ["apple"]
notes = "Apple TV platform."

[[platforms]]
os = "watchos"
description = "Apple watchOS"
environments = ["", "simulator"]
object_format = "macho"
common_vendors = ["apple"]
notes = "Apple Watch platform. Uses aarch64_32 (ILP32) for device."

[[platforms]]
os = "visionos"
description = "Apple visionOS (xrOS)"
environments = ["", "simulator"]
object_format = "macho"
common_vendors = ["apple"]
notes = "Apple Vision Pro platform."

[[platforms]]
os = "driverkit"
description = "Apple DriverKit (kernel extension replacement)"
environments = [""]
object_format = "macho"
common_vendors = ["apple"]
notes = "System extension framework for macOS/iOS."

